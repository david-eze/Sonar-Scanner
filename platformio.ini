; PlatformIO Project Configuration File for AI-Enhanced Sonar Scanner
; Target: ESP32-S3 with FreeRTOS, Dual-Core Architecture
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Build flags for optimization and FreeRTOS support
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -O3
    -ffast-math
    -frename-registers

; Upload settings
upload_speed = 921600
monitor_speed = 921600

; Serial port settings
monitor_filters = esp32_exception_decoder

; Library dependencies
lib_deps = 
    ; ArduinoJson for structured telemetry
    bblanchon/ArduinoJson@^6.21.3
    
; Extra scripts for partition layout (optional, for larger apps)
; board_build.partitions = default_8MB.csv
